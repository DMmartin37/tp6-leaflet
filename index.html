<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="height: 500px;"></div>
<script>var map = L.map('map').setView([-34.6037, -58.3816], 13);</script>
<script>

	  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
	    attribution: '&copy; OpenStreetMap contributors'
	  }).addTo(map);
</script>

<script>
    var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
});

var osmHOT = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors, Tiles style by Humanitarian OpenStreetMap Team hosted by OpenStreetMap France'});
</script>

<script>
    var baseMaps = {
    "Capa 1": osm,
    "Capa 2": osmHOT
};



</script>

<script>
    var layerControl = L.control.layers(baseMaps).addTo(map);
</script>

<script>
    var baseMaps = {
    "OpenStreetMap": osm,
    "<span style='color: red'>OpenStreetMap.HOT</span>": osmHOT
};

</script>

<script>
var openTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: 'Map data: © OpenStreetMap contributors, SRTM | Map style: © OpenTopoMap (CC-BY-SA)'
});
layerControl.addBaseLayer(openTopoMap, "OpenTopoMap");
</script>
<script>
    var greenIcon = L.icon({
    iconUrl: 'coliflor-a-la-plancha-v.png',
    shadowUrl: 'sombra.png',

    iconSize:     [38, 95], // size of the icon
    shadowSize:   [50, 64], // size of the shadow
    iconAnchor:   [22, 94], // point of the icon which will correspond to marker's location
    shadowAnchor: [4, 62],  // the same for the shadow
    popupAnchor:  [-3, -76] // point from which the popup should open relative to the iconAnchor
});
</script>

<script> var marker = L.marker([-34.6037, -58.3816]).addTo(map);</script>
<script>var marker = L.marker ([-34.6037, -58.3816], {icon: greenIcon}).addTo(map);
    marker.bindPopup("Hola! soy un popup");
</script>
<script> 
    var marker = L.marker ([-35.6037, -60.3816], {icon: greenIcon}).addTo(map);
    marker.bindPopup("Hola! soy un popup").openPopup();
    var marker = L.marker ([-24.6037, -58.8932], {icon: greenIcon}).addTo(map);
    marker.bindPopup("Hola! soy un popup").openPopup();
    var marker = L.marker ([-12.7037, -58.3816], {icon: greenIcon}).addTo(map);
    marker.bindPopup("Hola! soy un popup").openPopup();
</script>
<script>
    var popup = L.popup();

function onMapClick(e) {
    popup
        .setLatLng(e.latlng)
        .setContent("You clicked the map at " + e.latlng.toString())
        .openOn(map);
}

map.on('click', onMapClick);
</script>
<script>
    var circle = L.circle([-34.6037, -58.3816], {
    color: 'red',
    fillColor: '#f03',
    fillOpacity: 0.5,
    radius: 500
}).addTo(map);

</script>



</script>
</body>
</html>
