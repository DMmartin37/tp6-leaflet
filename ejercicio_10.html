<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>
    <div id="map" style="height: 500px;"></div>
    <script>
  var map = L.map('map').setView([-37.328912, -59.136742], 13);
</script>
<script>
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
</script>
<script>
    var escuela = L.icon({
    iconUrl: 'escuelaicono.png',

    iconSize:     [30, 50], // size of the icon
    iconAnchor:   [22, 50], // point of the icon which will correspond to marker's location
    popupAnchor:  [-10, -30] // point from which the popup should open relative to the iconAnchor
});
</script>
<script>
        var plaza = L.icon({
    iconUrl: 'plazaicono.png',

    iconSize:     [30, 50], // size of the icon
    iconAnchor:   [22, 50], // point of the icon which will correspond to marker's location
    popupAnchor:  [-3, -38] // point from which the popup should open relative to the iconAnchor
});
</script>
<script>
            var Hotel = L.icon({
    iconUrl: 'hotelicono.png',

    iconSize:     [30, 50], // size of the icon
    iconAnchor:   [22, 50], // point of the icon which will correspond to marker's location
    popupAnchor:  [-3, -38] // point from which the popup should open relative to the iconAnchor
});
</script>
<script>
            var restaurante = L.icon({
    iconUrl: 'restauranteicono.png',

    iconSize:     [30, 50], // size of the icon
    iconAnchor:   [22, 50], // point of the icon which will correspond to marker's location
    popupAnchor:  [-3, -38] // point from which the popup should open relative to the iconAnchor
});
</script>
<script>
    var marker = L.marker([-37.328728, -59.136926], {icon: plaza}).addTo(map);
    marker.bindPopup("Plaza del centro").openPopup();
    var marker = L.marker ([-37.329304, -59.131111], {icon: escuela}).addTo(map);
    marker.bindPopup("Escuela Tecnica numero 2").openPopup();
    var marker = L.marker ([-37.325098, -59.140691], {icon: restaurante}).addTo(map);
    marker.bindPopup("Pink Pizzas y Pastas").openPopup();
    var marker = L.marker ([-37.327214, -59.132746], {icon: Hotel}).addTo(map);
    marker.bindPopup("Hotel Roma").openPopup();
</script>
<script>
    var popup = L.popup();

function onMapClick(e) {
    popup
        .setLatLng(e.latlng)
        .setContent("Clickeaste en las cordenadas " + e.latlng.toString())
        .openOn(map);
}

map.on('click', onMapClick);
</script>
<script>
    var circle = L.circle([-37.328728, -59.136926], {
    color: 'Red',
    fillColor: '#f03',
    fillOpacity: 0.5,
    radius: 143
}).addTo(map);

</script>
</body>
</html>
